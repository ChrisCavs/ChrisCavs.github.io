<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ChrisCavs</title>
    <link href="resources/css/reset.css" rel="stylesheet" type="text/css">
    <link href="resources/css/style.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700" rel="stylesheet">
    <script type="text/javascript" src="resources/js/mysite.js"></script>
    <script defer src="https://use.fontawesome.com/releases/v5.0.2/js/all.js"></script>
  </head>
  <body>

    <header>
      <div class="chriscavs">
        <span class="chris">Chris</span>
        <span class="cavs"> Cavs</span>
      </div>

      <nav>
        <button class="tablinks" onclick="openPage(event, 'background')">Background</button>
        <button class="tablinks" onclick="openPage(event, 'projects')">Projects</button>
        <button class="tablinks" onclick="openPage(event, 'contact')">Contact</button>
      </nav>
    </header>

    <div class="tabcontent background" id="default">
      <div class="background-linkedin">
      </div>
      <div class="background-content">
        <h2 class="background-content-title">About Me</h2>
        <p class="background-content-body"></p>
      </div>
      <button class="bottom-tablinks" onclick="openPage(event, 'projects')">Let's see some projects...</button>
    </div>

    <div class="tabcontent projects">
      <div class="projects-content colmar">
      </div>
      <div class="projects-content matching-game">
      </div>
    </div>

    <div class="tabcontent contact">
      <div class="contact-content">
        <i class="fas fa-envelope"></i>
        <p>Email</p>
      </div>
      <div class="contact-content">
        <i class="fab fa-github"></i>
        <p>GitHub</p>
      </div>
      <div class="contact-content">
        <i class="fab fa-linkedin"></i>
        <p>LinkedIn</p>
      </div>
    </div>

    <footer>
      <div class="footer-content">
        <a href="#" data-jump=".chriscavs">Click me to go up</a>
      </div>
    </footer>

  </body>
</html>
